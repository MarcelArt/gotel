{{ define "content" }}
<div class="auth-wrapper">
    <div class="glass-card">
        <div class="glass-card-header">
            <h2>Create an account on <span>Gotel</span></h2>
            <p class="body-sm">Register a new operator profile to manage services.</p>
        </div>

        <!-- Error Alert Container -->
        <div id="error-container">
            {{ if .Error }}
            <div class="alert">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span>{{ .Error }}</span>
            </div>
            {{ end }}
        </div>

        <form hx-post="/register" hx-target="#error-container" hx-swap="innerHTML" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="form-control" 
                           placeholder="Choose a username" 
                           required 
                           minlength="3"
                           autocomplete="username"
                           value="{{ .Username }}">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" 
                           id="email" 
                           name="email" 
                           class="form-control" 
                           placeholder="name@example.com" 
                           required 
                           autocomplete="email"
                           value="{{ .Email }}">
                </div>
            </div>

            <div class="form-group" x-data="{ showPassword: false }">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input :type="showPassword ? 'text' : 'password'" 
                           id="password" 
                           name="password" 
                           class="form-control" 
                           placeholder="Create a strong password" 
                           required 
                           minlength="8"
                           autocomplete="new-password">
                    
                    <button type="button" 
                            class="btn-toggle-password" 
                            @click="showPassword = !showPassword"
                            :aria-label="showPassword ? 'Hide password' : 'Show password'">
                        <svg x-show="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg x-show="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" x-cloak><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 16px;">
                Create Account
                <svg class="htmx-indicator" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
            </button>

            <div style="margin-top: 24px; text-align: center;" class="body-sm">
                Already have an account? <a href="/login" hx-boost="true">Sign in here</a>
            </div>
        </form>
    </div>
</div>

<style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    [x-cloak] { display: none !important; }
</style>
{{ end }}
