{{ define "content" }}
<div class="dashboard-layout" x-data="{ currentTab: '{{ .ActiveTab }}', sidebarOpen: false }">
    <!-- Sidebar Backdrop on Mobile -->
    <div class="sidebar-backdrop" x-show="sidebarOpen" @click="sidebarOpen = false" x-transition x-cloak></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" :class="{ 'open': sidebarOpen }">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Gotel</span> Portal
            </div>
            <!-- Close Sidebar Button for Mobile -->
            <button type="button" class="btn-close-sidebar" @click="sidebarOpen = false" aria-label="Close menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <nav class="sidebar-menu">
            <a class="menu-item" 
               :class="{ 'active': currentTab === 'dashboard' }" 
               @click="currentTab = 'dashboard'; sidebarOpen = false"
               hx-get="/"
               hx-target="#outlet"
               hx-push-url="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                Dashboard
            </a>
            <a class="menu-item" 
               :class="{ 'active': currentTab === 'bookings' }" 
               @click="currentTab = 'bookings'; sidebarOpen = false"
               hx-get="/bookings"
               hx-target="#outlet"
               hx-push-url="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                Bookings
            </a>
            <a class="menu-item" 
               :class="{ 'active': currentTab === 'rooms' }" 
               @click="currentTab = 'rooms'; sidebarOpen = false"
               hx-get="/rooms"
               hx-target="#outlet"
               hx-push-url="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20M5 17V5a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3v12M9 6h6M9 10h6M12 14h.01"></path></svg>
                Rooms
            </a>
            <a class="menu-item" 
               :class="{ 'active': currentTab === 'staff' }" 
               @click="currentTab = 'staff'; sidebarOpen = false"
               hx-get="/staff"
               hx-target="#outlet"
               hx-push-url="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Staff
            </a>
            <a class="menu-item" 
               :class="{ 'active': currentTab === 'settings' }" 
               @click="currentTab = 'settings'; sidebarOpen = false"
               hx-get="/settings"
               hx-target="#outlet"
               hx-push-url="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Settings
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile-summary">
                <div class="avatar">
                    {{ if .User.Username }}{{ slice .User.Username 0 1 }}{{ else }}U{{ end }}
                </div>
                <div class="user-info-text">
                    <span class="username-display">{{ .User.Username }}</span>
                    <span class="email-display">{{ .User.Email }}</span>
                </div>
            </div>
            
            <form action="/logout" method="POST">
                <button type="submit" class="btn btn-secondary" style="min-height: 40px; font-size: 14px; width: 100%;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content Workspace -->
    <main class="main-content">
        <!-- Mobile Top Navigation Bar -->
        <div class="mobile-nav-bar">
            <button type="button" class="btn-menu" @click="sidebarOpen = true" aria-label="Open menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="mobile-brand"><span>Gotel</span> Portal</div>
            <div style="width: 40px;"></div> <!-- Spacer to visually center the brand title -->
        </div>

        <div id="outlet">
            {{ template "outlet" . }}
        </div>
    </main>
</div>
{{ end }}
