{{ define "outlet" }}
<div class="dashboard-card" style="text-align: center; padding: 80px 24px; max-width: 600px; margin: 40px auto; border-color: rgba(255, 180, 171, 0.15); background: rgba(23, 31, 51, 0.45); backdrop-filter: blur(12px);">
    <div style="width: 80px; height: 80px; border-radius: 50%; background-color: rgba(255, 180, 171, 0.08); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--color-error)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <h2 class="title-md" style="color: white; margin-bottom: 12px; font-size: 24px;">Access Denied</h2>
    <p class="body-sm" style="color: var(--color-secondary); margin-bottom: 32px; font-size: 15px; line-height: 1.5; max-width: 480px; margin-left: auto; margin-right: auto;">You do not have the required permissions to view this section. Please contact your system administrator if you believe this is an error.</p>
    <a href="/" class="btn btn-primary" style="display: inline-flex; width: auto; min-height: 40px; font-size: 14px; padding: 0 24px; align-items: center; justify-content: center; text-decoration: none; border-radius: var(--rounded-default);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Return to Dashboard
    </a>
</div>
{{ end }}
